name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Smoke-run the pipeline
        run: |
          python -m expense_pipeline run examples/reports/large_trip.json
          python -m expense_pipeline run examples/reports/gift_highrisk.json
          python -m expense_pipeline cost
